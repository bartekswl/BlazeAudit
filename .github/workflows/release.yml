name: Release

# Build the Windows installer and publish it (with latest.yml + blockmap for
# electron-updater) to a GitHub Release whenever a v* tag is pushed.
#   git tag v0.1.1 && git push origin v0.1.1

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release
